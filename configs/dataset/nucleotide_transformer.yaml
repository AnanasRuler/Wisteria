# =============================================================================
# CONFIGURATION SUMMARY
# =============================================================================
# 
# 此配置文件定义了基因组序列分类任务的数据集参数，包含18个活跃任务：
#
# 任务分类：
# 1. 启动子识别 (3个): 序列长度300bp, 2分类
#    - promoter_all, promoter_no_tata, promoter_tata
# 
# 2. 增强子识别 (2个): 序列长度400bp
#    - enhancers (2分类), enhancers_types (3分类)
# 
# 3. 剪切位点预测 (3个): 序列长度600bp
#    - splice_sites_acceptors, splice_sites_donors (2分类)
#    - splice_sites_all (3分类)
# 
# 4. 组蛋白修饰预测 (10个): 序列长度1000bp, 全部2分类
#    - H2AFZ, H3K27ac, H3K27me3, H3K36me3, H3K4me1
#    - H3K4me2, H3K4me3, H3K9ac, H3K9me3, H4K20me1
#
# 训练集大小：
# - 标准: 30,000个序列 (大部分任务)
# - 特殊: promoter_tata (5,062), H3K9ac (23,274), H3K9me3 (27,438)
#
# 评估指标：
# - MCC (Matthews Correlation Coefficient): 大部分任务
# - F1_binary: 启动子和剪切位点任务
# - Accuracy: splice_sites_all任务
#
# 注意：配置文件已移除旧的H3, H4, H3K14ac等任务，以匹配最新数据集规
