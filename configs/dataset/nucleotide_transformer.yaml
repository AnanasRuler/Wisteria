_name_: nucleotide_transformer  # this links to the overall SequenceDataset of all nucleotide transformer datasets
train_val_split_seed: ${train.seed}  # Used for train/validation splitting
dataset_name: enhancers  # this specifies which dataset in nuc trx
dest_path: null  # path to overall nuc trx datasets
max_length: ${.${.dataset_name}.max_length}
d_output: ${.${.dataset_name}.classes} 
use_padding: True
padding_side: left
add_eos: False
batch_size: 256
train_len: ${.${.dataset_name}.train_len}
__l_max: ${.max_length}
shuffle: true  # set this as default!
metric: ${.${.dataset_name}.metric}

# Updated dataset configurations based on new specifications
enhancers:
  train_len: 30000
  classes: 2
  max_length: 400
  metric: mcc

enhancers_types:
  train_len: 30000
  classes: 3
  max_length: 400
  metric: mcc

promoter_all:
  train_len: 30000
  classes: 2
  max_length: 300
  metric: f1_binary

promoter_no_tata:
  train_len: 30000
  classes: 2
  max_length: 300
  metric: f1_binary

promoter_tata:
  train_len: 5062
  classes: 2
  max_length: 300
  metric: f1_binary

splice_sites_acceptors:
  train_len: 30000
  classes: 2
  max_length: 600
  metric: f1_binary

splice_sites_all:
  train_len: 30000
  classes: 3
  max_length: 600
  metric: accuracy

splice_sites_donors:
  train_len: 30000
  classes: 2
  max_length: 600
  metric: f1_binary

